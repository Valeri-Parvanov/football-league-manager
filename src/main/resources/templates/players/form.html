<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Player form</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<main class="page">
<h1 th:text="${playerDto.id} ? 'Edit player' : 'Add player'"></h1>

<form th:action="${playerDto.id} ? @{/players/{id}/edit(id=${playerDto.id})} : @{/players/create}"
      th:object="${playerDto}" method="post">

    <div>
        <label for="firstName">First name</label>
        <input type="text" id="firstName" th:field="*{firstName}"/>
        <span style="color:red" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
    </div>

    <div>
        <label for="lastName">Last name</label>
        <input type="text" id="lastName" th:field="*{lastName}"/>
        <span style="color:red" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
    </div>

    <div>
        <label for="shirtNumber">Shirt number</label>
        <input type="number" id="shirtNumber" th:field="*{shirtNumber}"/>
        <span style="color:red" th:if="${#fields.hasErrors('shirtNumber')}" th:errors="*{shirtNumber}"></span>
    </div>

    <div>
        <label for="teamId">Team</label>
        <select id="teamId" th:field="*{teamId}">
            <option value="">-- select team --</option>
            <option th:each="team : ${teams}" th:value="${team.id}" th:text="${team.name}"></option>
        </select>
        <span style="color:red" th:if="${#fields.hasErrors('teamId')}" th:errors="*{teamId}"></span>
    </div>

    <button type="submit">Save</button>
</form>

<p><a th:href="@{/players}" class="back-link">&#8592; Back to players</a></p>
</main>
</body>
</html>

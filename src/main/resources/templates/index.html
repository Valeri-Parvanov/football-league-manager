<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Football League Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<header class="topbar">
    <div class="brand"><span class="ball">&#9917;</span>Football League Manager</div>

    <nav>
        <a th:href="@{/leagues}">&#127942; Leagues</a>
        <a th:href="@{/teams}">&#128737; Teams</a>
        <a th:href="@{/players}">&#129489; Players</a>
        <a th:href="@{/matches}">&#9917; Matches</a>
    </nav>

    <div class="auth-box" sec:authorize="isAnonymous()">
        <a th:href="@{/login}">Login</a>
        <a th:href="@{/register}">Register</a>
    </div>

    <div class="auth-box" sec:authorize="isAuthenticated()">
        <span class="welcome">Welcome, <span sec:authentication="name"></span>!</span>
        <form th:action="@{/logout}" method="post">
            <button type="submit">Logout</button>
        </form>
    </div>
</header>

<main class="page">
    <h1>Manage your league</h1>
    <p>Use the navigation above to browse leagues, teams, players and matches.</p>
</main>
</body>
</html>

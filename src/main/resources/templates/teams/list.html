<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Teams</title>
</head>
<body>
<h1>Teams</h1>

<p><a th:href="@{/}">Back to home</a></p>

<div sec:authorize="hasRole('ADMIN')">
    <a th:href="@{/teams/create}">Add new team</a>
</div>

<table border="1" cellpadding="6">
    <thead>
    <tr>
        <th>Name</th>
        <th>City</th>
        <th>League</th>
        <th sec:authorize="hasRole('ADMIN')">Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="team : ${teams}">
        <td th:text="${team.name}"></td>
        <td th:text="${team.city}"></td>
        <td th:text="${team.leagueName}"></td>
        <td sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/teams/{id}/edit(id=${team.id})}">Edit</a>
            <form th:action="@{/teams/{id}/delete(id=${team.id})}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
